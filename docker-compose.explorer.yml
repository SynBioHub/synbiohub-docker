services:
    explorer:
        image: myersresearchgroup/sbolexplorer:snapshot-synbiohub
        privileged: true 
        ports:
            - "13162:13162"
        depends_on:
            - elasticsearch
            - synbiohub
        volumes:
            - type: volume
              source: explorer
              target: /mnt
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:6.3.2
        depends_on: 
            - virtuoso
        ports:
            - "9200:9200"
        volumes:
            - type: volume
              source: esdata
              target: /usr/share/elasticsearch/data
volumes:
    esdata:
    explorer:
